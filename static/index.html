<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PaperFlow</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="layout">
        <section id="homeSection" class="screen active">
          <nav id="modeTabs" class="mode-tabs">
            <div class="mode-brand">PaperFlow</div>
            <div class="mode-tab active" data-mode="today" role="button" tabindex="0">今日更新</div>
            <div class="mode-tab" data-mode="queue" role="button" tabindex="0">待阅读</div>
            <div class="mode-tab" data-mode="images" role="button" tabindex="0">图片预览</div>
            <button id="syncButton" class="sync-button" data-sync-trigger="true">同步</button>
          </nav>

          <section id="readerPanel" class="reader-panel"></section>
          <section id="imagePanel" class="image-panel hidden"></section>
        </section>

        <section id="mySection" class="screen hidden">
          <div class="my-stack">
            <section class="panel my-panel my-panel-primary">
              <div class="section-head my-panel-head">
                <h2 id="collectionTitle">收藏论文</h2>
                <div class="segmented-tabs">
                  <button class="segmented-tab active" data-collection-tab="papers">论文</button>
                  <button class="segmented-tab" data-collection-tab="images">图片</button>
                </div>
              </div>
              <div class="my-search-row">
                <input id="paperSearch" type="search" placeholder="搜索标题 / 期刊 / 备注" />
              </div>
              <div class="my-panel-body">
                <div id="savedPapers" class="stack-list"></div>
                <div id="savedImages" class="saved-image-grid hidden"></div>
              </div>
            </section>

            <section class="panel my-panel my-panel-secondary">
              <div class="section-head my-panel-head">
                <h2 id="manageTitle">订阅管理</h2>
                <div class="segmented-tabs">
                  <button class="segmented-tab active" data-manage-tab="subscriptions">订阅</button>
                  <button class="segmented-tab" data-manage-tab="stats">统计</button>
                </div>
              </div>
              <div class="my-panel-body">
                <div id="manageSubscriptions">
                  <form id="subscriptionForm" class="subscription-form">
                    <input id="subscriptionName" type="text" placeholder="期刊名称" />
                    <input id="subscriptionUrl" type="url" placeholder="RSS URL" />
                    <button type="submit" class="primary-button">添加订阅</button>
                  </form>
                  <div id="subscriptionList" class="stack-list"></div>
                </div>
                <div id="manageStats" class="hidden">
                  <div id="statsPanel" class="stats-grid"></div>
                  <div class="settings-card">
                    <h3>设置</h3>
                    <p>当前为演示模式：默认游客可直接浏览，收藏和状态写入本地 JSON。</p>
                    <p>后续可继续接登录、回收站、专栏 / 图集分类和后台规则维护。</p>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </section>
      </main>

      <nav id="bottomNav" class="bottom-nav">
        <button class="nav-item active" data-screen="home">首页</button>
        <button class="nav-item" data-screen="my">我的</button>
      </nav>
    </div>

    <div id="imageModal" class="image-modal hidden">
      <div class="image-modal-backdrop" data-close-modal="true"></div>
      <div class="image-modal-card">
        <button id="closeModal" class="close-button">关闭</button>
        <div id="modalBody"></div>
      </div>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
