<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no"
    />
    <title>PaperFlow</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260330a" />
  </head>
  <body>
    <div class="app-shell">
      <main class="app-main">
        <section id="homeScreen" class="screen active">
          <nav class="mode-tabs" aria-label="首页模式">
            <span class="mode-brand">PaperFlow</span>
            <div class="mode-tab-row">
              <button class="mode-tab active" data-mode="today" type="button">
                <span>今日新增</span>
                <strong id="todayCount">0</strong>
              </button>
              <button class="mode-tab" data-mode="queue" type="button">
                <span>待阅读</span>
                <strong id="queueCount">0</strong>
              </button>
              <button class="mode-tab" data-mode="images" type="button">
                <span>图片速览</span>
              </button>
            </div>
          </nav>

          <section id="readerPanel" class="screen-panel"></section>
          <section id="imagePanel" class="screen-panel hidden"></section>
        </section>

        <section id="collectionScreen" class="screen hidden">
          <section id="collectionPanel" class="screen-panel"></section>
        </section>

        <section id="subscriptionScreen" class="screen hidden">
          <section id="subscriptionPanel" class="screen-panel"></section>
        </section>

        <section id="myScreen" class="screen hidden">
          <section id="myPanel" class="screen-panel"></section>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="主导航">
        <button class="bottom-tab active" data-screen="home" type="button">首页</button>
        <button class="bottom-tab" data-screen="collection" type="button">收藏</button>
        <button class="bottom-tab" data-screen="subscriptions" type="button">订阅</button>
        <button class="bottom-tab" data-screen="my" type="button">我的</button>
      </nav>
    </div>

    <div id="imageModal" class="image-modal hidden">
      <div class="image-modal-backdrop" data-close-modal="true"></div>
      <div class="image-modal-card">
        <button id="closeModal" class="close-button" type="button">关闭</button>
        <div id="modalBody"></div>
      </div>
    </div>

    <div id="readerPreviewModal" class="image-modal hidden">
      <div class="image-modal-backdrop" data-close-reader-preview="true"></div>
      <div id="readerPreviewCard" class="reader-preview-card">
        <div id="readerPreviewBody"></div>
      </div>
    </div>

    <script src="/static/app.js?v=20260330a" defer></script>
  </body>
</html>
